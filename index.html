<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Simulation</title>
    <link rel="icon" href="/SocraticChatGPT/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typeit/8.8.7/index.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            width: 90vw; /* 🔹 전체 창의 90% 차지 (반응형) */
            height: 90vh; /* 🔹 전체 창의 90% 차지 */
            max-width: 1200px; /* 🔹 최대 크기 제한 (너무 커지지 않도록) */
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            flex-direction: column;
            width: 150px;
            background: #eee;
            padding: 10px;
            border-right: 1px solid #ccc;
        }

        .tab {
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            background: #f4f4f4;
        }

        .tab.active {
            background: #ddd;
            font-weight: bold;
        }

        .chat-container {
            flex: 1; /* 🔹 남은 공간을 모두 차지 */
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            max-width: 70%; /* 🔹 메시지 폭을 가변적으로 설정 */
            word-wrap: break-word;
        }

        .user {
            justify-content: flex-start;
        }

        .bot {
            justify-content: flex-end;
        }

        .bubble {
            padding: 10px;
            border-radius: 10px;
            max-width: 100%; /* 🔹 부모 요소에 맞게 가변 크기 */
            word-wrap: break-word;
        }

        .user .bubble {
            background: #d1e7fd;
            color: black;
        }

        .bot .bubble {
            background: #c1f0c1;
            color: black;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const chatsDir = "chats/";

        function formatFileName(filename) {
            return filename.replace(".json", "").replace(/-/g, " ");
        }

        function Tabs({ onSelect, activeTab, chatFiles }) {
            return React.createElement(
                "div",
                { className: "tabs" },
                chatFiles.map(file =>
                    React.createElement(
                        "div",
                        {
                            key: file,
                            className: `tab ${activeTab === file ? "active" : ""}`,
                            onClick: () => onSelect(file)
                        },
                        formatFileName(file)
                    )
                )
            );
        }

        function ChatFeed({ chatData, currentTab }) {
            const messagesRef = React.useRef({});
            const [visibleMessages, setVisibleMessages] = React.useState([]);
            const chatContainerRef = React.useRef(null); // 📌 스크롤 컨테이너 ref 추가

            React.useEffect(() => {
                if (!chatData || chatData.length === 0) return;

                if (!messagesRef.current[currentTab]) {
                    messagesRef.current[currentTab] = [];
                }
                setVisibleMessages(messagesRef.current[currentTab]);

                async function loadMessages() {
                    for (const msg of chatData) {
                        if (messagesRef.current[currentTab].some(m => m.id === msg.id)) {
                            continue;
                        }

                        messagesRef.current[currentTab].push(msg);
                        setVisibleMessages([...messagesRef.current[currentTab]]);
                        await sleepMs(100);

                        await new Promise(res => {
                            const inst = new TypeIt(`#msg-${msg.id}`, {
                                strings: [marked.parse(msg.message)],
                                speed: 50,
                                waitUntilVisible: true,
                                afterComplete: () => {
                                    inst.destroy();
                                    res();
                                }
                            }).go();
                        });

                        await sleepMs(1000);
                    }
                }

                loadMessages();
            }, [chatData, currentTab]);

            // 📌 최신 메시지를 주기적으로 따라가는 함수
            function scrollToBottom() {
                if (chatContainerRef.current) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
            }

            // 📌 1초마다 스크롤을 최신 메시지로 이동 (타이핑 중에도 이동)
            React.useEffect(() => {
                const interval = setInterval(scrollToBottom, 1000); // 🔹 1초마다 실행
                return () => clearInterval(interval); // 🔹 컴포넌트가 언마운트되면 정리
            }, []);

            function sleepMs(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            return React.createElement(
                "div",
                { className: "chat-container", ref: chatContainerRef }, // 📌 ref 추가
                visibleMessages.map(msg =>
                    React.createElement(
                        "div",
                        { key: msg.id, className: `message ${msg.sender === 1 ? "user" : "bot"}` },
                        React.createElement("div", {
                            id: `msg-${msg.id}`,
                            className: "bubble"
                        })
                    )
                )
            );
        }


        function App() {
            const [chatFiles, setChatFiles] = React.useState([]); // JSON에서 가져온 파일 목록
            const [currentTab, setCurrentTab] = React.useState(null); // 현재 선택된 탭
            const [chatData, setChatData] = React.useState([]);
            const messagesRef = React.useRef({});

            // 📌 1️⃣ JSON 파일 목록을 비동기적으로 로드
            React.useEffect(() => {
                async function fetchChatFiles() {
                    try {
                        const response = await fetch(chatsDir + "index.json");
                        const data = await response.json();
                        setChatFiles(data.files);

                        // 첫 번째 파일을 기본 선택
                        if (data.files.length > 0) {
                            setCurrentTab(data.files[0]); // 첫 번째 채팅 파일을 초기 선택
                        }
                    } catch (error) {
                        console.error("파일 리스트 불러오는 중 오류 발생:", error);
                    }
                }

                fetchChatFiles();
            }, []);

            // 📌 2️⃣ 선택된 탭의 채팅 내용을 불러옴
            React.useEffect(() => {
                async function loadChat(file) {
                    if (!file) return;

                    if (messagesRef.current[file]) {
                        setChatData(messagesRef.current[file]); // 캐시된 데이터 사용
                    } else {
                        try {
                            const response = await fetch(chatsDir + file);
                            const data = await response.json();
                            messagesRef.current[file] = data.messages;
                            setChatData(data.messages);
                        } catch (error) {
                            console.error("대화를 불러오는 중 오류 발생:", error);
                        }
                    }
                }

                loadChat(currentTab);
            }, [currentTab]);

            return React.createElement(
                "div",
                { className: "container" },
                React.createElement(Tabs, { onSelect: setCurrentTab, activeTab: currentTab, chatFiles }),
                React.createElement(ChatFeed, { chatData, currentTab })
            );
        }

        ReactDOM.render(React.createElement(App), document.getElementById("root"));
    </script>
</body>
</html>
