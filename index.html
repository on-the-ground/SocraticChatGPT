<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Simulation</title>
    <link rel="icon" href="/SocraticChatGPT/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typeit/8.8.7/index.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
            transition: width 0.3s ease-in-out;
        }

        .container.full-width {
            width: 100vw;
        }

        .tabs-container {
            display: flex;
            flex-direction: column;
            background: #eee;
            border-right: 1px solid #ccc;
            transition: width 0.3s ease-in-out;
        }

        .tabs {
            padding: 10px;
        }

        .tab {
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            background: #f4f4f4;
        }

        .tab.active {
            background: #ddd;
            font-weight: bold;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            transition: width 0.3s ease-in-out;
        }

        .toggle-tabs-button {
            width: 100%;
            padding: 8px 12px;
            background: #5f5f5f;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            transition: all 0.3s ease-in-out;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .user {
            justify-content: flex-start;
        }

        .bot {
            justify-content: flex-end;
        }

        .bubble {
            padding: 10px;
            border-radius: 10px;
            max-width: 100%;
            word-wrap: break-word;
        }

        .user .bubble {
            background: #d1e7fd;
            color: black;
        }

        .bot .bubble {
            background: #c1f0c1;
            color: black;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const chatsDir = "chats/";

        function sleepMs(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

        function formatFileName(filename) {
            return filename.replace(".json", "").replace(/-/g, " ");
        }

        function Tabs({ onSelect, activeTab, chatFiles }) {
            return (
                <div className="tabs">
                    {chatFiles.map(file => (
                        <div
                            key={file}
                            className={`tab ${activeTab === file ? "active" : ""}`}
                            onClick={() => onSelect(file)}
                        >
                            {formatFileName(file)}
                        </div>
                    ))}
                </div>
            );
        }

        function ChatFeed({ chatData, currentTab }) {
            const messagesRef = React.useRef({});
            const [visibleMessages, setVisibleMessages] = React.useState([]);
            const chatContainerRef = React.useRef(null);
            const [isAtBottom, setIsAtBottom] = React.useState(true);

            React.useEffect(() => {
                if (!chatData || chatData.length === 0) return;

                if (!messagesRef.current[currentTab]) {
                    messagesRef.current[currentTab] = [];
                }
                setVisibleMessages(messagesRef.current[currentTab]);

                async function loadMessages() {
                    for (const msg of chatData) {
                        if (messagesRef.current[currentTab].some(m => m.id === msg.id)) {
                            continue;
                        }

                        messagesRef.current[currentTab].push(msg);
                        setVisibleMessages([...messagesRef.current[currentTab]]);
                        await sleepMs(100);

                        await new Promise(res => {
                            const inst = new TypeIt(`#msg-${msg.id}`, {
                                strings: [marked.parse(msg.message)],
                                speed: 50,
                                waitUntilVisible: true,
                                afterComplete: () => {
                                    inst.destroy();
                                    res();
                                }
                            }).go();
                        });

                        if (isAtBottom) scrollToBottom();

                        await sleepMs(1000);
                    }
                }

                loadMessages();
            }, [chatData, currentTab]);

            function scrollToBottom() {
                if (chatContainerRef.current && isAtBottom) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
            }

            // 📌 스크롤 이벤트 핸들러 (사용자가 스크롤을 위로 올리면 자동 스크롤 멈춤)
            function handleScroll() {
                if (!chatContainerRef.current) return;
                const { scrollTop, scrollHeight, clientHeight } = chatContainerRef.current;
                const isUserAtBottom = scrollTop + clientHeight >= scrollHeight - 10; // 🔹 약간의 마진 추가

                setIsAtBottom(isUserAtBottom);
            }

            // 📌 1초마다 스크롤을 최신 메시지로 이동 (isAtBottom이 true일 때만)
            React.useEffect(() => {
                const interval = setInterval(scrollToBottom, 1000);
                return () => clearInterval(interval);
            }, [isAtBottom]); // 🔹 isAtBottom이 true일 때만 실행

            // 📌 스크롤 이벤트 감지 (사용자가 움직이면 자동 스크롤 비활성화)
            React.useEffect(() => {
                const chatContainer = chatContainerRef.current;
                if (!chatContainer) return;

                chatContainer.addEventListener("scroll", handleScroll);
                return () => chatContainer.removeEventListener("scroll", handleScroll);
            }, []);

            return (
                <div className="chat-container" ref={chatContainerRef}>
                    {visibleMessages.map(msg => (
                        <div key={msg.id} className={`message ${msg.sender === 1 ? "user" : "bot"}`}>
                            <div id={`msg-${msg.id}`} className="bubble"></div>
                        </div>
                    ))}
                </div>
            );
        }

        function App() {
            const [chatFiles, setChatFiles] = React.useState([]);
            const [currentTab, setCurrentTab] = React.useState(null);
            const [chatData, setChatData] = React.useState([]);
            const [isTabsOpen, setIsTabsOpen] = React.useState(true);

            React.useEffect(() => {
                async function fetchChatFiles() {
                    try {
                        const response = await fetch(chatsDir + "index.json");
                        const data = await response.json();
                        setChatFiles(data.files);
                        if (data.files.length > 0) {
                            setCurrentTab(data.files[0]);
                        }
                    } catch (error) {
                        console.error("파일 리스트 불러오는 중 오류 발생:", error);
                    }
                }
                fetchChatFiles();
            }, []);

            React.useEffect(() => {
                if (!currentTab) return;
                setChatData([]);

                async function loadChat(file) {
                    try {
                        const response = await fetch(chatsDir + file);
                        const data = await response.json();
                        setChatData(data.messages);
                    } catch (error) {
                        console.error("대화를 불러오는 중 오류 발생:", error);
                    }
                }

                loadChat(currentTab);
            }, [currentTab]);

            return (
                <div className={`container ${isTabsOpen ? "" : "full-width"}`}>
                    <div className="tabs-container">
                        <button 
                            className="toggle-tabs-button"
                            onClick={() => setIsTabsOpen(prev => !prev)}
                        >
                            {isTabsOpen ? "<<" : ">>"}
                        </button>
                        {isTabsOpen && <Tabs onSelect={setCurrentTab} activeTab={currentTab} chatFiles={chatFiles} />}
                    </div>
                    <ChatFeed chatData={chatData} currentTab={currentTab} />
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById("root"));
    </script>
</body>
</html>
