<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Simulation</title>
    <link rel="icon" href="/SocraticChatGPT/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typeit/8.8.7/index.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recoil@0.7.7/umd/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
            transition: width 0.3s ease-in-out;
        }

        .container.full-width {
            width: 100vw;
        }

        .tabs-container {
            display: flex;
            flex-direction: column;
            background: #eee;
            border-right: 1px solid #ccc;
            transition: width 0.3s ease-in-out;
        }

        .tabs {
            padding: 10px;
        }

        .tab {
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            background: #f4f4f4;
        }

        .tab.active {
            background: #ddd;
            font-weight: bold;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            transition: width 0.3s ease-in-out;
        }

        .toggle-tabs-button {
            width: 100%;
            padding: 8px 12px;
            background: #5f5f5f;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            text-align: center;
            transition: all 0.3s ease-in-out;
        }

        .message {
            display: flex;
            margin-bottom: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }

        .user {
            justify-content: flex-start;
        }

        .bot {
            justify-content: flex-end;
        }

        .bubble {
            padding: 10px;
            border-radius: 10px;
            max-width: 100%;
            word-wrap: break-word;
        }

        .user .bubble {
            background: #d1e7fd;
            color: black;
        }

        .bot .bubble {
            background: #c1f0c1;
            color: black;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { RecoilRoot, atom, selector, useRecoilState, useRecoilValue, useResetRecoilState } = Recoil;

        const chatsDir = "chats/";

        function sleepMs(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function formatFileName(filename) {
            return filename.replace(".json", "").replace(/-/g, " ");
        }

        // ✅ Recoil 상태 관리
        const currentTabState = atom({ key: "currentTab", default: null });
        const isTabsOpenState = atom({ key: "isTabsOpen", default: true });

        // ✅ 선택된 채팅 데이터 가져오기 (selector)
        const chatDataSelector = selector({
            key: "chatDataSelector",
            get: async ({ get }) => {
                const currentTab = get(currentTabState);
                if (!currentTab) return [];

                // console.log("Fetching chat data for:", currentTab);
                try {
                    const response = await fetch(chatsDir + currentTab);
                    if (!response.ok) {
                        console.error("Failed to load chat data:", response.statusText);
                        return [];
                    }
                    const data = await response.json();
                    return data.messages || [];
                } catch (error) {
                    console.error("Fetch failed:", error);
                    return [];
                }
            }
        });


        // ✅ 채팅 파일 목록 가져오기 (selector)
        const chatFilesState = selector({
            key: "chatFilesState",
            get: async () => {
                try {
                    const response = await fetch(chatsDir + "index.json");
                    if (!response.ok) {
                        console.error("Failed to load chat index:", response.statusText);
                        return [];
                    }
                    const data = await response.json();
                    // console.log("Chat index loaded:", data.files);
                    return data.files || [];
                } catch (error) {
                    console.error("Fetch failed:", error);
                    return [];
                }
            },
        });

        function Tabs() {
            const chatFiles = useRecoilValue(chatFilesState);
            const [currentTab, setCurrentTab] = useRecoilState(currentTabState);

            React.useEffect(() => {
                if (chatFiles.length > 0 && !currentTab) {
                    setCurrentTab(chatFiles[0]); // ✅ 첫 번째 채팅 파일 자동 선택
                }
            }, [chatFiles]);

            return (
                <div className="tabs">
                    {chatFiles.map(file => (
                        <div
                            key={file}
                            className={`tab ${currentTab === file ? "active" : ""}`}
                            onClick={() => setCurrentTab(file)}
                        >
                            {formatFileName(file)}
                        </div>
                    ))}
                </div>
            );
        }

        function ChatFeed() {
            const chatContainerRef = React.useRef(null);
            const [isAtBottom, setIsAtBottom] = React.useState(true);
            const isAtBottomRef = React.useRef(isAtBottom);
            
            const chatData = useRecoilValue(chatDataSelector);

            function scrollToBottomByPeriod() {
                if(!isAtBottomRef.current) return;
                // console.log("isAtBottomRef.current:", isAtBottomRef.current);
                // console.log("chatContainerRef.current:", chatContainerRef.current);
                if (chatContainerRef.current) {
                    chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
                }
                setTimeout(scrollToBottomByPeriod, 1000);
            }

            React.useEffect(() => {
                isAtBottomRef.current = isAtBottom; // ✅ 최신 값을 ref에 동기화
                scrollToBottomByPeriod();
            }, [isAtBottom]);
            
            const [visibleMessages, setVisibleMessages] = React.useState([]); // todo 요거 Ref로 반경가능?
            const currentTab = useRecoilValue(currentTabState);
            React.useEffect(() => {
                setVisibleMessages([]);  // 새로운 채팅을 불러올 때 상태 초기화
            }, [currentTab]);

            async function loadMessages(chatData) {
                for (const [msgId, msg] of chatData.entries()) {
                    if (visibleMessages.some(m => m.id === msgId)) {
                        continue;
                    }

                    setVisibleMessages(prev => [...prev, msg]);
                    await sleepMs(100);

                    await new Promise(res => {
                        const inst = new TypeIt(`#msg-${msgId}`, {
                            strings: [marked.parse(msg.message)],
                            speed: 50,
                            waitUntilVisible: true,
                            afterComplete: () => {
                                inst.destroy();
                                res();
                            }
                        }).go();
                    });

                    await sleepMs(1000);
                }
            }

            React.useEffect(() => {
                if (!chatData 
                || chatData.length === 0 
                || chatData.length === visibleMessages.length) {
                    return;
                }
                loadMessages(chatData);
            }, [chatData]);

            // console.log("ChatFeed Rendered - chatData:", chatData); // ✅ 데이터가 들어오는지 확인
            // console.log("ChatFeed Rendered - visibleMessages:", visibleMessages); // ✅ 상태 확인


            const handleScroll = () => { 
                if (!chatContainerRef.current) return;
                const { scrollTop, scrollHeight, clientHeight } = chatContainerRef.current;
                const margin = 50;
                const isBottom = scrollTop + clientHeight >= scrollHeight - margin;
                // console.log("handleScroll.isBottom:", isBottom);
                setIsAtBottom(isBottom);
            };


            return visibleMessages.length === 0
            ? <div className="chat-container">Loading messages...</div>
            : (
                <div className="chat-container" ref={chatContainerRef} onScroll={handleScroll}>
                    {visibleMessages.entries().map(([msgId, msg]) => (
                        <div key={msgId} className={`message ${msg.sender === 1 ? "user" : "bot"}`}>
                            <div id={`msg-${msgId}`} className="bubble"></div>
                        </div>
                    ))}
                </div>
            );
        }

        function App() {
            const [isTabsOpen, setIsTabsOpen] = useRecoilState(isTabsOpenState);

            return (
                <div className={`container ${isTabsOpen ? "" : "full-width"}`}>
                    <div className="tabs-container">
                        <button className="toggle-tabs-button" onClick={() => setIsTabsOpen(prev => !prev)}>
                            {isTabsOpen ? "<<" : ">>"}
                        </button>
                        {isTabsOpen && (
                            <React.Suspense fallback={<div>Loading tabs...</div>}>
                                <Tabs />
                            </React.Suspense>
                        )}
                    </div>
                    <React.Suspense fallback={<div>Loading chat...</div>}>
                        <ChatFeed />
                    </React.Suspense>
                </div>
            );
        }

        ReactDOM.render(
            <RecoilRoot>
                <App />
            </RecoilRoot>,
            document.getElementById("root")
        );
    </script>
</body>
</html>
