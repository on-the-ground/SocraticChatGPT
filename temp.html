<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/17.0.2/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/typeit/8.8.7/index.umd.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            display: flex;
            width: 600px;
            height: 500px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .tabs {
            display: flex;
            flex-direction: column;
            width: 150px;
            background: #eee;
            padding: 10px;
            border-right: 1px solid #ccc;
        }
        .tab {
            cursor: pointer;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 5px;
            background: #f4f4f4;
        }
        .tab.active {
            background: #ddd;
            font-weight: bold;
        }
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .message {
            display: flex;
            margin-bottom: 10px;
            max-width: 80%;
        }
        .user {
            justify-content: flex-start;
        }
        .bot {
            justify-content: flex-end;
        }
        .bubble {
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .user .bubble {
            background: #d1e7fd;
            color: black;
        }
        .bot .bubble {
            background: #c1f0c1;
            color: black;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        const chatsDir = "chats/"; // JSON 파일 저장 경로
        const chatFiles = ["chat1.json", "conversation-about-ai.json", "my-thoughts-on-tech.json"];
        
        function formatFileName(filename) {
            return filename.replace(".json", "").replace(/-/g, " "); // "-"를 공백으로 변경
        }

        function Tabs({ onSelect }) {
            const [activeTab, setActiveTab] = React.useState(chatFiles[0]);

            return React.createElement(
                "div",
                { className: "tabs" },
                chatFiles.map(file =>
                    React.createElement(
                        "div",
                        {
                            key: file,
                            className: `tab ${activeTab === file ? "active" : ""}`,
                            onClick: () => {
                                setActiveTab(file);
                                onSelect(file);
                            }
                        },
                        formatFileName(file)
                    )
                )
            );
        }

        function ChatFeed({ chatData }) {
            const [visibleMessages, setVisibleMessages] = React.useState([]);
            React.useEffect(() => {
                setVisibleMessages([]); // 새 대화 로드 시 초기화
                if (chatData.length > 0) {
                    loadMessages(chatData);
                }
            }, [chatData]);

            async function loadMessages(messages) {
                for (const msg of messages) {
                    setVisibleMessages(prevMessages => [...prevMessages, msg]);
                    await sleepMs(100);

                    await new Promise(res => {
                        const inst = new TypeIt(`#msg-${msg.id}`, {
                            strings: [marked.parse(msg.message)],
                            speed: 50,
                            waitUntilVisible: true,
                            afterComplete: () => {
                                inst.destroy();
                                res();
                            }
                        }).go();
                    });
                    await sleepMs(2000);
                }
            }

            async function sleepMs(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            return React.createElement(
                "div",
                { className: "chat-container" },
                visibleMessages.map(msg =>
                    React.createElement(
                        "div",
                        { key: msg.id, className: `message ${msg.sender === 1 ? "user" : "bot"}` },
                        React.createElement("div", {
                            id: `msg-${msg.id}`,
                            className: "bubble"
                        })
                    )
                )
            );
        }

        function App() {
            const [chatData, setChatData] = React.useState([]);

            function loadChat(file) {
                fetch(chatsDir + file)
                    .then(response => response.json())
                    .then(data => setChatData(data.messages))
                    .catch(error => console.error("대화를 불러오는 중 오류 발생:", error));
            }

            React.useEffect(() => {
                loadChat(chatFiles[0]); // 첫 번째 대화 자동 로드
            }, []);

            return React.createElement(
                "div",
                { className: "container" },
                React.createElement(Tabs, { onSelect: loadChat }),
                React.createElement(ChatFeed, { chatData })
            );
        }

        ReactDOM.render(React.createElement(App), document.getElementById("root"));
    </script>
</body>
</html>
